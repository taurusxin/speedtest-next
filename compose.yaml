services:
  speedtest-next:
    build:
      context: .
      dockerfile: Dockerfile
    image: speedtest-next:latest
    container_name: speedtest-next
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPEEDTEST_ADDR: ":8080"
      SPEEDTEST_LOG_NOISY_API: "false"
      SPEEDTEST_SITE_TITLE: "${SPEEDTEST_SITE_TITLE:-SpeedTest Next}"
      SPEEDTEST_GITHUB_URL: "${SPEEDTEST_GITHUB_URL:-https://github.com/taurusxin/speedtest-next}"
      SPEEDTEST_TARGET_IPV4: "${SPEEDTEST_TARGET_IPV4}"
      SPEEDTEST_TARGET_IPV6: "${SPEEDTEST_TARGET_IPV6}"
      SPEEDTEST_LATENCY_SAMPLE_COUNT: "${SPEEDTEST_LATENCY_SAMPLE_COUNT:-10}"
      SPEEDTEST_LATENCY_SAMPLE_GAP_MS: "${SPEEDTEST_LATENCY_SAMPLE_GAP_MS:-160}"
      SPEEDTEST_DOWNLOAD_CONCURRENCY: "${SPEEDTEST_DOWNLOAD_CONCURRENCY:-6}"
      SPEEDTEST_DOWNLOAD_DURATION_MS: "${SPEEDTEST_DOWNLOAD_DURATION_MS:-9000}"
      SPEEDTEST_DOWNLOAD_CHUNK_BYTES: "${SPEEDTEST_DOWNLOAD_CHUNK_BYTES:-6291456}"
      SPEEDTEST_UPLOAD_CONCURRENCY: "${SPEEDTEST_UPLOAD_CONCURRENCY:-4}"
      SPEEDTEST_UPLOAD_DURATION_MS: "${SPEEDTEST_UPLOAD_DURATION_MS:-7000}"
      SPEEDTEST_UPLOAD_CHUNK_BYTES: "${SPEEDTEST_UPLOAD_CHUNK_BYTES:-1048576}"
      SPEEDTEST_SAMPLING_INTERVAL_MS: "${SPEEDTEST_SAMPLING_INTERVAL_MS:-250}"
      SPEEDTEST_CHART_POINTS_LIMIT: "${SPEEDTEST_CHART_POINTS_LIMIT:-120}"
      SPEEDTEST_DISPLAY_SMOOTHING_FACTOR: "${SPEEDTEST_DISPLAY_SMOOTHING_FACTOR:-0.35}"
